<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>电商购物平台</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.prod.js"></script>
  <script src="https://unpkg.com/pinia@2/dist/pinia.iife.prod.js"></script>
  <style>
    :root {
      --primary: #ff4757;
      --primary-dark: #e84138;
      --bg: #f5f6fa;
      --card-bg: #ffffff;
      --text: #2d3436;
      --text-light: #636e72;
      --border: #e0e0e0;
      --radius: 12px;
      --shadow: 0 2px 12px rgba(0,0,0,.08);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ===== Navbar ===== */
    .navbar {
      background: var(--primary);
      color: #fff;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(255,71,87,.3);
    }
    .navbar .logo {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      user-select: none;
    }
    .nav-links { display: flex; gap: 24px; align-items: center; }
    .nav-links a {
      color: rgba(255,255,255,.85);
      text-decoration: none;
      font-size: 14px;
      padding: 6px 12px;
      border-radius: 6px;
      transition: all .2s;
    }
    .nav-links a:hover, .nav-links a.active { color: #fff; background: rgba(255,255,255,.15); }
    .cart-badge {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .cart-count {
      background: #fff;
      color: var(--primary);
      font-size: 11px;
      font-weight: 700;
      min-width: 18px;
      height: 18px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
    }

    /* ===== Container ===== */
    .container { max-width: 960px; margin: 0 auto; padding: 24px 16px; }

    /* ===== Home Page ===== */
    .hero {
      background: linear-gradient(135deg, #ff4757, #ff6b81);
      color: #fff;
      border-radius: var(--radius);
      padding: 48px 32px;
      text-align: center;
      margin-bottom: 32px;
    }
    .hero h1 { font-size: 32px; margin-bottom: 12px; }
    .hero p { font-size: 16px; opacity: .9; margin-bottom: 24px; }
    .hero .btn { display: inline-block; background: #fff; color: var(--primary); padding: 12px 32px; border-radius: 24px; text-decoration: none; font-weight: 600; font-size: 16px; transition: transform .2s; }
    .hero .btn:hover { transform: scale(1.05); }

    .features { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 32px; }
    .feature-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 24px;
      text-align: center;
      box-shadow: var(--shadow);
    }
    .feature-card .icon { font-size: 36px; margin-bottom: 8px; }
    .feature-card h3 { font-size: 16px; margin-bottom: 4px; }
    .feature-card p { font-size: 13px; color: var(--text-light); }

    /* ===== Product List ===== */
    .section-title { font-size: 22px; font-weight: 700; margin-bottom: 16px; }
    .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
    .product-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: transform .2s, box-shadow .2s;
      display: flex;
      flex-direction: column;
    }
    .product-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,.12); }
    .product-img {
      height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 64px;
      color: #fff;
    }
    .product-info { padding: 16px; flex: 1; display: flex; flex-direction: column; }
    .product-name { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .product-desc { font-size: 12px; color: var(--text-light); margin-bottom: 8px; flex: 1; }
    .product-price { font-size: 20px; font-weight: 700; color: var(--primary); }
    .product-price .unit { font-size: 13px; font-weight: 400; }
    .product-actions { margin-top: 10px; display: flex; gap: 8px; }
    .btn-sm {
      flex: 1;
      padding: 8px 0;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      font-weight: 600;
      transition: all .2s;
    }
    .btn-add {
      background: var(--primary);
      color: #fff;
    }
    .btn-add:hover { background: var(--primary-dark); }
    .btn-detail {
      background: var(--bg);
      color: var(--text);
      text-decoration: none;
      text-align: center;
    }
    .btn-detail:hover { background: var(--border); }

    /* ===== Product Detail ===== */
    .detail-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 32px;
      box-shadow: var(--shadow);
      display: flex;
      gap: 32px;
      align-items: flex-start;
    }
    .detail-img {
      width: 280px;
      height: 280px;
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 100px;
      color: #fff;
      flex-shrink: 0;
    }
    .detail-info { flex: 1; }
    .detail-info h2 { font-size: 24px; margin-bottom: 8px; }
    .detail-info .desc { color: var(--text-light); margin-bottom: 16px; line-height: 1.6; }
    .detail-info .price { font-size: 32px; font-weight: 700; color: var(--primary); margin-bottom: 20px; }
    .detail-info .price .unit { font-size: 16px; font-weight: 400; }
    .btn-large {
      padding: 12px 40px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 24px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
    }
    .btn-large:hover { background: var(--primary-dark); transform: scale(1.03); }
    .btn-large:disabled { background: #ccc; cursor: not-allowed; transform: none; }
    .added-tip { display: inline-block; margin-left: 12px; color: #2ed573; font-size: 14px; }

    /* ===== Cart Page ===== */
    .cart-empty {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-light);
    }
    .cart-empty .icon { font-size: 72px; margin-bottom: 16px; }
    .cart-empty p { font-size: 16px; margin-bottom: 20px; }
    .cart-list { display: flex; flex-direction: column; gap: 12px; }
    .cart-item {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: var(--shadow);
    }
    .cart-item-img {
      width: 80px;
      height: 80px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      color: #fff;
      flex-shrink: 0;
    }
    .cart-item-info { flex: 1; }
    .cart-item-name { font-size: 15px; font-weight: 600; }
    .cart-item-price { font-size: 13px; color: var(--text-light); }
    .cart-item-qty { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
    .qty-btn {
      width: 28px; height: 28px;
      border: 1px solid var(--border);
      background: #fff;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .2s;
    }
    .qty-btn:hover { background: var(--bg); }
    .cart-item-total { font-size: 18px; font-weight: 700; color: var(--primary); min-width: 80px; text-align: right; }
    .btn-remove {
      background: none;
      border: none;
      color: #ccc;
      font-size: 18px;
      cursor: pointer;
      padding: 4px 8px;
      transition: color .2s;
    }
    .btn-remove:hover { color: var(--primary); }

    .cart-summary {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 24px;
      margin-top: 20px;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
    }
    .cart-total { font-size: 24px; font-weight: 700; }
    .cart-total span { color: var(--primary); font-size: 32px; }
    .cart-actions { display: flex; gap: 12px; }
    .btn-clear {
      padding: 12px 24px;
      background: #fff;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 24px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
    }
    .btn-clear:hover { background: #ffe0e3; border-color: var(--primary); color: var(--primary); }
    .btn-checkout {
      padding: 12px 32px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 24px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
    }
    .btn-checkout:hover { background: var(--primary-dark); transform: scale(1.03); }
    .btn-checkout:disabled { background: #ccc; cursor: not-allowed; transform: none; }

    /* ===== 404 Page ===== */
    .not-found {
      text-align: center;
      padding: 100px 20px;
    }
    .not-found .code {
      font-size: 120px;
      font-weight: 900;
      color: var(--primary);
      line-height: 1;
    }
    .not-found h2 { font-size: 24px; margin: 16px 0 8px; }
    .not-found p { color: var(--text-light); margin-bottom: 32px; }
    .countdown { color: var(--primary); font-weight: 700; }
    .btn-home {
      display: inline-block;
      padding: 12px 32px;
      background: var(--primary);
      color: #fff;
      text-decoration: none;
      border-radius: 24px;
      font-weight: 600;
      transition: all .2s;
    }
    .btn-home:hover { background: var(--primary-dark); }

    /* ===== Order Success ===== */
    .order-success {
      text-align: center;
      padding: 80px 20px;
    }
    .order-success .check {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #2ed573;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      color: #fff;
      margin: 0 auto 24px;
      animation: popIn .4s ease;
    }
    @keyframes popIn {
      0% { transform: scale(0); }
      70% { transform: scale(1.15); }
      100% { transform: scale(1); }
    }
    .order-success h2 { font-size: 28px; margin-bottom: 8px; }
    .order-success .order-id {
      font-size: 14px;
      color: var(--text-light);
      margin-bottom: 8px;
    }
    .order-success .amount { font-size: 20px; margin-bottom: 24px; }
    .order-success .amount span { color: var(--primary); font-weight: 700; font-size: 28px; }
    .order-success .countdown { color: var(--text-light); font-size: 14px; margin-bottom: 20px; }

    /* ===== Toasts ===== */
    .toast-container {
      position: fixed;
      top: 72px;
      right: 20px;
      z-index: 999;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .toast {
      background: #2d3436;
      color: #fff;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 14px;
      animation: slideIn .3s ease;
      box-shadow: 0 4px 12px rgba(0,0,0,.2);
    }
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    @media (max-width: 640px) {
      .features { grid-template-columns: 1fr; }
      .detail-card { flex-direction: column; }
      .detail-img { width: 100%; height: 200px; }
      .cart-item { flex-wrap: wrap; }
    }
  </style>
</head>
<body>
  <div id="app"></div>


  <!-- 最终修正脚本：重新构建整个应用 -->
  <script>
  (function() {
    // 清理之前的挂载
    const appEl = document.getElementById('app');
    if (appEl._vue_app) {
      appEl._vue_app.unmount();
    }

    // ===== Toast 事件总线 =====
    const toastBus = {
      listeners: [],
      emit(msg) { this.listeners.forEach(fn => fn(msg)); },
      on(fn) { this.listeners.push(fn); }
    };

    // ===== Pinia Store =====
    const useCartStore = Pinia.defineStore('cart', {
      state: () => ({
        items: JSON.parse(localStorage.getItem('cart_items') || '[]'),
        lastOrderAmount: 0  // 保存下单时的金额，清空购物车后仍可展示
      }),
      getters: {
        totalCount(state) {
          return state.items.reduce((sum, item) => sum + item.quantity, 0);
        },
        totalPrice(state) {
          return state.items.reduce((sum, item) => sum + item.price * item.quantity, 0);
        },
        isEmpty(state) {
          return state.items.length === 0;
        }
      },
      actions: {
        _persist() {
          localStorage.setItem('cart_items', JSON.stringify(this.items));
        },
        addToCart(product, quantity = 1) {
          const existing = this.items.find(item => item.id === product.id);
          if (existing) {
            existing.quantity += quantity;
          } else {
            this.items.push({
              id: product.id,
              name: product.name,
              price: product.price,
              image: product.image || '📦',
              color: product.color || '#dfe6e9',
              quantity
            });
          }
          this._persist();
          return existing ? '已更新商品数量' : '已加入购物车';
        },
        removeFromCart(productId) {
          const idx = this.items.findIndex(item => item.id === productId);
          if (idx !== -1) {
            const name = this.items[idx].name;
            this.items.splice(idx, 1);
            this._persist();
            return '已移除: ' + name;
          }
          return null;
        },
        updateQuantity(productId, quantity) {
          const item = this.items.find(item => item.id === productId);
          if (item) {
            if (quantity <= 0) return this.removeFromCart(productId);
            item.quantity = quantity;
            this._persist();
          }
          return null;
        },
        increaseQty(productId) {
          const item = this.items.find(item => item.id === productId);
          if (item) { item.quantity++; this._persist(); }
        },
        decreaseQty(productId) {
          const item = this.items.find(item => item.id === productId);
          if (item) {
            if (item.quantity <= 1) return this.removeFromCart(productId);
            item.quantity--;
            this._persist();
          }
          return null;
        },
        // 下单结算：保存订单金额并清空购物车
        checkout() {
          this.lastOrderAmount = this.totalPrice;
          this.items = [];
          this._persist();
        },
        clearCart() {
          this.items = [];
          this._persist();
          return '购物车已清空';
        }
      }
    });

    // ===== 商品数据 =====
    const products = [
      { id: 1, name: '无线蓝牙耳机', desc: '主动降噪 | 30h续航 | Hi-Fi音质', price: 299, image: '🎧', color: '#2d3436' },
      { id: 2, name: '智能手表 Pro', desc: '心率监测 | 血氧检测 | 14天续航', price: 899, image: '⌚', color: '#636e72' },
      { id: 3, name: '便携充电宝 20000mAh', desc: '快充 | 数显 | 轻薄机身', price: 129, image: '🔋', color: '#00b894' },
      { id: 4, name: '机械键盘 87键', desc: '青轴 | RGB背光 | 热插拔', price: 349, image: '⌨️', color: '#6c5ce7' },
      { id: 5, name: '运动跑鞋 轻云', desc: '超轻透气 | 缓震回弹 | 防滑耐磨', price: 459, image: '👟', color: '#fd79a8' },
      { id: 6, name: '双肩电脑包', desc: '防泼水 | 15.6寸 | USB充电口', price: 189, image: '🎒', color: '#0984e3' },
      { id: 7, name: '保温杯 500ml', desc: '316不锈钢 | 24h保温 | 真空断热', price: 89, image: '☕', color: '#e17055' },
      { id: 8, name: '无线鼠标 静音版', desc: '双模连接 | 人体工学 | 超长续航', price: 79, image: '🖱️', color: '#b2bec3' },
    ];

    const toast = (msg) => toastBus.emit(msg);

    // ===== 首页 =====
    const HomePage = {
      template: '#tpl-home',
      computed: {
        hotProducts() { return products.slice(0, 4); },
        cartStore() { return useCartStore(); }
      },
      methods: {
        addItem(p) {
          const msg = this.cartStore.addToCart(p);
          toast(msg);
        }
      }
    };

    // ===== 商品列表 =====
    const ProductsPage = {
      template: '#tpl-products',
      computed: {
        allProducts() { return products; },
        cartStore() { return useCartStore(); }
      },
      methods: {
        addItem(p) {
          const msg = this.cartStore.addToCart(p);
          toast(msg);
        }
      }
    };

    // ===== 商品详情 =====
    const ProductDetail = {
      template: '#tpl-detail',
      data() { return { added: false }; },
      computed: {
        product() {
          return products.find(p => p.id === Number(this.$route.params.id));
        },
        cartStore() { return useCartStore(); }
      },
      methods: {
        addItem() {
          if (this.product) {
            const msg = this.cartStore.addToCart(this.product);
            this.added = true;
            toast(msg);
            setTimeout(() => { this.added = false; }, 2000);
          }
        }
      }
    };

    // ===== 购物车 =====
    const CartPage = {
      template: '#tpl-cart',
      computed: {
        cartStore() { return useCartStore(); }
      },
      methods: {
        removeItem(item) {
          const msg = this.cartStore.removeFromCart(item.id);
          if (msg) toast(msg);
        },
        clearCart() {
          if (this.cartStore.isEmpty) return;
          if (confirm('确定要清空购物车吗？此操作不可撤销。')) {
            const msg = this.cartStore.clearCart();
            toast(msg);
          }
        },
        checkout() {
          if (this.cartStore.isEmpty) return;
          // 下单：保存金额并清空购物车，跳转至成功页
          this.cartStore.checkout();
          this.$router.push('/order-success');
        }
      }
    };

    // ===== 下单成功页 =====
    const OrderSuccessPage = {
      template: '#tpl-order-success',
      data() {
        return {
          orderId: 'ORD' + Date.now().toString(36).toUpperCase(),
          countdown: 10,
          timer: null
        };
      },
      computed: {
        amount() { return this.cartStore.lastOrderAmount.toFixed(2); },
        cartStore() { return useCartStore(); }
      },
      mounted() {
        this.timer = setInterval(() => {
          this.countdown--;
          if (this.countdown <= 0) {
            clearInterval(this.timer);
            this.$router.push('/');
          }
        }, 1000);
      },
      beforeUnmount() {
        if (this.timer) clearInterval(this.timer);
      }
    };

    // ===== 404 页面 =====
    const NotFoundPage = {
      template: '#tpl-404',
      data() {
        return {
          countdown: 10,
          timer: null
        };
      },
      mounted() {
        this.timer = setInterval(() => {
          this.countdown--;
          if (this.countdown <= 0) {
            clearInterval(this.timer);
            this.$router.push('/');
          }
        }, 1000);
      },
      beforeUnmount() {
        if (this.timer) clearInterval(this.timer);
      }
    };

    // ===== 路由 =====
    const routes = [
      { path: '/', component: HomePage },
      { path: '/products', component: ProductsPage },
      { path: '/product/:id', component: ProductDetail },
      { path: '/cart', component: CartPage },
      { path: '/order-success', component: OrderSuccessPage },
      { path: '/:pathMatch(.*)*', component: NotFoundPage },
    ];

    const router = VueRouter.createRouter({
      history: VueRouter.createWebHashHistory(),
      routes
    });

    const pinia = Pinia.createPinia();

    // ===== 根组件 =====
    const AppRoot = {
      template: '#tpl-root',
      data() {
        return { toasts: [] };
      },
      computed: {
        cartStore() { return useCartStore(); }
      },
      mounted() {
        toastBus.on((msg) => {
          this.toasts.push(msg);
          setTimeout(() => { this.toasts.shift(); }, 2500);
        });
      }
    };

    const app = Vue.createApp(AppRoot);
    app.use(router);
    app.use(pinia);
    app.mount('#app');
  })();
  </script>

  <!-- ==================== 模板 ==================== -->
  <script type="text/x-template" id="tpl-root">
    <div>
      <nav class="navbar">
        <div class="logo" @click="$router.push('/')">🛒 优选商城</div>
        <div class="nav-links">
          <router-link to="/">首页</router-link>
          <router-link to="/products">全部商品</router-link>
          <router-link to="/cart" class="cart-badge">
            🛒 购物车
            <span class="cart-count" v-if="cartStore.totalCount > 0">{{ cartStore.totalCount }}</span>
          </router-link>
        </div>
      </nav>

      <div class="toast-container">
        <div class="toast" v-for="(t, i) in toasts" :key="i">{{ t }}</div>
      </div>

      <router-view></router-view>
    </div>
  </script>

  <script type="text/x-template" id="tpl-home">
    <div class="container">
      <div class="hero">
        <h1>🔥 优选好物 限时特惠</h1>
        <p>全场满299包邮 · 新人首单立减20元 · 7天无理由退换</p>
        <router-link to="/products" class="btn">立即抢购</router-link>
      </div>
      <div class="features">
        <div class="feature-card">
          <div class="icon">🚚</div>
          <h3>极速配送</h3>
          <p>全国次日达，部分城市当日达</p>
        </div>
        <div class="feature-card">
          <div class="icon">🛡️</div>
          <h3>正品保障</h3>
          <p>100%正品承诺，假一赔十</p>
        </div>
        <div class="feature-card">
          <div class="icon">💬</div>
          <h3>专属客服</h3>
          <p>7×24小时在线，随时为您服务</p>
        </div>
      </div>
      <div class="section-title">🔥 热销爆款</div>
      <div class="product-grid">
        <div class="product-card" v-for="p in hotProducts" :key="p.id">
          <div class="product-img" :style="{ background: p.color }">{{ p.image }}</div>
          <div class="product-info">
            <div class="product-name">{{ p.name }}</div>
            <div class="product-desc">{{ p.desc }}</div>
            <div class="product-price"><span class="unit">¥</span>{{ p.price }}</div>
            <div class="product-actions">
              <router-link :to="'/product/' + p.id" class="btn-sm btn-detail">详情</router-link>
              <button class="btn-sm btn-add" @click="addItem(p)">加入购物车</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </script>

  <script type="text/x-template" id="tpl-products">
    <div class="container">
      <div class="section-title">📦 全部商品</div>
      <div class="product-grid">
        <div class="product-card" v-for="p in allProducts" :key="p.id">
          <div class="product-img" :style="{ background: p.color }">{{ p.image }}</div>
          <div class="product-info">
            <div class="product-name">{{ p.name }}</div>
            <div class="product-desc">{{ p.desc }}</div>
            <div class="product-price"><span class="unit">¥</span>{{ p.price }}</div>
            <div class="product-actions">
              <router-link :to="'/product/' + p.id" class="btn-sm btn-detail">详情</router-link>
              <button class="btn-sm btn-add" @click="addItem(p)">加入购物车</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </script>

  <script type="text/x-template" id="tpl-detail">
    <div class="container">
      <div class="detail-card" v-if="product">
        <div class="detail-img" :style="{ background: product.color }">{{ product.image }}</div>
        <div class="detail-info">
          <h2>{{ product.name }}</h2>
          <p class="desc">{{ product.desc }}</p>
          <p class="price"><span class="unit">¥</span>{{ product.price }}</p>
          <div>
            <button class="btn-large" @click="addItem" :disabled="added">
              {{ added ? '✅ 已加入购物车' : '🛒 加入购物车' }}
            </button>
            <span class="added-tip" v-if="added">添加成功!</span>
          </div>
          <p style="margin-top:16px;color:var(--text-light);font-size:13px;">
            📦 满299包邮 · 🔄 7天无理由退换 · 🛡️ 正品保障
          </p>
        </div>
      </div>
      <div class="not-found" v-else>
        <div class="code">😢</div>
        <h2>商品不存在</h2>
        <router-link to="/products" class="btn-home">返回商品列表</router-link>
      </div>
    </div>
  </script>

  <script type="text/x-template" id="tpl-cart">
    <div class="container">
      <div class="section-title">🛒 我的购物车</div>

      <div class="cart-empty" v-if="cartStore.isEmpty">
        <div class="icon">🛒</div>
        <p>购物车是空的，快去挑选好物吧~</p>
        <router-link to="/products" class="btn-home">去逛逛</router-link>
      </div>

      <template v-else>
        <div class="cart-list">
          <div class="cart-item" v-for="item in cartStore.items" :key="item.id">
            <div class="cart-item-img" :style="{ background: item.color }">{{ item.image }}</div>
            <div class="cart-item-info">
              <div class="cart-item-name">{{ item.name }}</div>
              <div class="cart-item-price">单价: ¥{{ item.price }}</div>
              <div class="cart-item-qty">
                <button class="qty-btn" @click="cartStore.decreaseQty(item.id)">−</button>
                <span>{{ item.quantity }}</span>
                <button class="qty-btn" @click="cartStore.increaseQty(item.id)">+</button>
              </div>
            </div>
            <div class="cart-item-total">¥{{ (item.price * item.quantity).toFixed(2) }}</div>
            <button class="btn-remove" @click="removeItem(item)" title="删除">✕</button>
          </div>
        </div>

        <div class="cart-summary">
          <div class="cart-total">
            合计: <span>¥{{ cartStore.totalPrice.toFixed(2) }}</span>
            <div style="font-size:13px;color:var(--text-light);">共 {{ cartStore.totalCount }} 件商品</div>
          </div>
          <div class="cart-actions">
            <button class="btn-clear" @click="clearCart">🗑️ 清空购物车</button>
            <button class="btn-checkout" @click="checkout" :disabled="cartStore.isEmpty">💳 立即结算</button>
          </div>
        </div>
      </template>
    </div>
  </script>

  <script type="text/x-template" id="tpl-order-success">
    <div class="container">
      <div class="order-success">
        <div class="check">✓</div>
        <h2>🎉 下单成功!</h2>
        <div class="order-id">订单编号: {{ orderId }}</div>
        <div class="amount">实付金额: <span>¥{{ amount }}</span></div>
        <p style="color:var(--text-light);margin-bottom:8px;">我们将尽快为您发货，请留意物流信息~</p>
        <p class="countdown">{{ countdown }} 秒后自动跳转至首页</p>
        <div style="display:flex;gap:12px;justify-content:center;">
          <router-link to="/" class="btn-home" style="background:#fff;color:var(--text);border:1px solid var(--border);">
            返回首页
          </router-link>
          <router-link to="/products" class="btn-home">
            继续购物
          </router-link>
        </div>
      </div>
    </div>
  </script>

  <script type="text/x-template" id="tpl-404">
    <div class="container">
      <div class="not-found">
        <div class="code">404</div>
        <h2>😵 页面未找到</h2>
        <p>您访问的页面不存在，可能已被移除或地址输入有误</p>
        <p class="countdown">{{ countdown }} 秒后自动返回首页</p>
        <router-link to="/" class="btn-home">返回首页</router-link>
      </div>
    </div>
  </script>
</body>
</html>
